<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA STORE | المفهوم الاحترافي الفاخر المتجاوب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-dark: #0F172A;
            --border-light: #E2E8F0;
            --bg-body: #F8FAFC;
            --bg-card: #FFFFFF;
            --accent-gold: #B45309;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            letter-spacing: -0.1px;
            padding-bottom: 0; /* سيتم تعديله في الموبايل ليناسب القائمة السفلية */
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        header {
            background-color: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        .logo-btn {
            font-size: 24px;
            font-weight: 700;
            color: var(--slate-dark);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-btn span {
            font-weight: 300;
            color: var(--text-muted);
        }

        /* قائمة التصفح للشاشات الكبيرة */
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-filter-btn {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .nav-filter-btn:hover, .nav-filter-btn.active {
            color: var(--slate-dark);
            border-bottom-color: var(--slate-dark);
        }

        .cart-icon-btn {
            background-color: var(--slate-dark);
            color: var(--bg-card);
            padding: 10px 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .cart-count {
            background-color: var(--bg-body);
            color: var(--slate-dark);
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        /* البار السفلي المخصص للموبايل فقط - Mobile Bottom Navigation Bar */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-light);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            z-index: 1001;
            justify-content: space-around;
            align-items: center;
            padding: 5px 10px;
        }

        .mobile-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            gap: 4px;
            flex: 1;
        }

        .mobile-nav-btn.active, .mobile-nav-btn:hover {
            color: var(--slate-dark);
            font-weight: 700;
        }

        .mobile-cart-badge-wrapper {
            position: relative;
            display: inline-block;
        }

        .mobile-cart-badge {
            position: absolute;
            top: -8px;
            left: -12px;
            background-color: var(--accent-gold);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        /* سلة المشتريات الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-card);
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-light);
            box-shadow: 10px 0 40px rgba(0,0,0,0.05);
        }

        .cart-sidebar.active { left: 0; }

        .cart-item {
            display: flex;
            gap: 15px;
            background: var(--bg-body);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            align-items: center;
            border: 1px solid var(--border-light);
        }

        .cart-item img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 4px;
        }

        .qty-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            width: 26px;
            height: 26px;
            border-radius: 4px;
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* شبكة الأقسام الراقية (تدعم السحب الأفقي بالموبايل) */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .category-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
        }

        .category-btn img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .category-btn h3 {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
            margin-top: 30px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 500;
            color: var(--slate-dark);
        }

        /* شبكة كروت المنتجات الاحترافية المتجاوبة */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }

        .product-img-wrapper {
            width: 100%;
            height: 360px;
            overflow: hidden;
            background-color: var(--bg-body);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-category {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .product-stock {
            font-size: 11px;
            color: var(--text-main);
            background-color: var(--bg-body);
            padding: 3px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 15px;
            border: 1px solid var(--border-light);
        }

        .card-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--border-light);
            padding-top: 15px;
        }

        .product-price {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 17px;
        }

        .btn-add-cart {
            background-color: var(--slate-dark);
            color: white;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
        }

        .close-btn { color: var(--text-muted); font-size: 28px; }

        /* 🛠️ تفاصيل التجاوب الفاخر للموبايلات والأجهزة اللوحية */
        @media (max-width: 768px) {
            body {
                padding-bottom: 70px; /* تفريغ مساحة أسفل الشاشة للبار المثبت */
            }
            header {
                padding: 5px 0;
            }
            nav, .header-container > .cart-icon-btn {
                display: none; /* إخفاء العناصر العلوية المزدحمة */
            }
            .header-container {
                justify-content: center; /* توسيط اللوجو في منتصف شاشة الهاتف */
                padding: 15px;
            }
            .mobile-bottom-nav {
                display: flex; /* إظهار بار التحكم السفلي الذكي */
            }
            
            /* تحويل الأقسام لشريط أفقي منزلق احترافي جداً */
            .categories-grid {
                display: flex;
                overflow-x: auto;
                gap: 15px;
                padding-bottom: 15px;
                margin-bottom: 30px;
                scrollbar-width: none; /* إخفاء شريط التمرير الافتراضي */
            }
            .categories-grid::-webkit-scrollbar {
                display: none;
            }
            .category-btn {
                flex: 0 0 140px; /* تثبيت عرض الكارت أثناء السحب الإنسيابي */
                padding: 10px;
            }
            .category-btn img {
                height: 110px;
            }
            .category-btn h3 {
                font-size: 13px;
            }

            /* تحويل المنتجات لكارتين بجانب بعضهما (مظهر تطبيقات الموضة العالمية) */
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 20px;
            }
            .product-img-wrapper {
                height: 200px; /* تقليص الارتفاع ليناسب الشاشات الصغيرة */
            }
            .product-info {
                padding: 12px;
            }
            .product-name {
                font-size: 14px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis; /* قص الأسماء الطويلة بنقاط لمنع تشوه الكارت */
            }
            .product-desc {
                display: none; /* إخفاء الوصف الطويل في كروت الموبايل ليبقى المظهر نظيفاً */
            }
            .card-footer-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding-top: 10px;
            }
            .btn-add-cart {
                width: 100%;
                text-align: center;
                padding: 8px;
                font-size: 12px;
            }
            .cart-sidebar {
                max-width: 100%; /* تأخذ السلة مساحة الشاشة بالكامل في الهاتف لراحة العين */
            }
        }
    </style>
</head>
<body>

    <!-- هيدر الشاشات الكبيرة واللوجو الموحد -->
    <header>
        <div class="header-container">
            <div class="header-right">
                <button class="logo-btn" onclick="filterProducts('all')">TIA <span>STORE</span></button>
                <nav>
                    <ul>
                        <li><button class="nav-filter-btn" id="btn-kids" onclick="filterProducts('kids')">ملابس أطفال</button></li>
                        <li><button class="nav-filter-btn" id="btn-women" onclick="filterProducts('women')">ملابس حريمي</button></li>
                        <li><button class="nav-filter-btn" id="btn-men" onclick="filterProducts('men')">ملابس رجالي</button></li>
                        <li><button class="nav-filter-btn" id="btn-accessories" onclick="filterProducts('accessories')">إكسسوارات</button></li>
                        <li><button class="nav-filter-btn" id="btn-home" onclick="filterProducts('home')">أدوات منزلية</button></li>
                    </ul>
                </nav>
            </div>
            <button class="cart-icon-btn" onclick="toggleCart()">🛒 المشتريات <span class="cart-count" id="cartCount">0</span></button>
        </div>
    </header>

    <!-- 📱 البار السفلي المثبت للهواتف الذكية (Native App Navigation) -->
    <div class="mobile-bottom-nav">
        <button class="mobile-nav-btn active" id="mbtn-all" onclick="filterProducts('all')">
            <span>🏠</span> الرئيسية
        </button>
        <button class="mobile-nav-btn" id="mbtn-women" onclick="filterProducts('women')">
            <span>👗</span> حريمي
        </button>
        <button class="mobile-nav-btn" id="mbtn-men" onclick="filterProducts('men')">
            <span>👔</span> رجالي
        </button>
        <button class="mobile-nav-btn" onclick="toggleCart()">
            <div class="mobile-cart-badge-wrapper">
                <span>👜</span>
                <span class="mobile-cart-badge" id="mobileCartCount">0</span>
            </div>
            السلة
        </button>
    </div>

    <!-- سلة تسوق العميل المتجاوبة -->
    <div class="cart-sidebar" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;">
            <h3 style="font-size:18px; font-weight:700;">سلة المشتريات</h3>
            <button class="close-btn" onclick="toggleCart()">×</button>
        </div>
        <div style="flex-grow: 1; overflow-y: auto;" id="cartItemsContainer"></div>
        <div style="border-top: 1px solid var(--border-light); padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 16px; font-weight: 700;">
                <span>الإجمالي:</span>
                <span id="cartTotalSum" style="color: var(--accent-gold);">0 ج.م</span>
            </div>
            <button style="width: 100%; padding: 14px; background-color: var(--slate-dark); color: white; border-radius:6px; font-weight:700; font-size:14px;" onclick="alert('جاري توجيهك الآمن لشبكة المدفوعات الإلكترونية...')">الانتقال للدفع الآمن</button>
        </div>
    </div>

    <div class="main-container">
        <!-- شريط الأقسام المنزلق تفاعلياً بالموبايل -->
        <div class="categories-grid">
            <button class="category-btn" onclick="filterProducts('kids')">
                <img src="https://images.unsplash.com/photo-1503919545889-aef636e10ad4?q=80&w=400">
                <h3>ملابس الأطفال</h3>
            </button>
            <button class="category-btn" onclick="filterProducts('women')">
                <img src="https://images.unsplash.com/photo-1485230895905-ec40ba36b9bc?q=80&w=400">
                <h3>ملابس حريمي</h3>
            </button>
            <button class="category-btn" onclick="filterProducts('men')">
                <img src="https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?q=80&w=400">
                <h3>ملابس رجالي</h3>
            </button>
            <button class="category-btn" onclick="filterProducts('accessories')">
                <img src="https://images.unsplash.com/photo-1509319117193-57bab727e09d?q=80&w=400">
                <h3>إكسسوارات فاخرة</h3>
            </button>
            <button class="category-btn" onclick="filterProducts('home')">
                <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=400">
                <h3>أدوات منزلية</h3>
            </button>
        </div>

        <div class="section-header">
            <h2 id="sectionTitleDisplay">كل المجموعات الحالية</h2>
            <button class="btn-action" style="padding: 8px 16px; background-color: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-muted); border-radius:6px; font-size:13px;" onclick="filterProducts('all')">عرض الكل</button>
        </div>

        <!-- شبكة كروت المنتجات الاحترافية المتجاوبة (2 في الموبايل و 4 في الشاشة الكبيرة) -->
        <div class="products-grid" id="productsContainer"></div>
    </div>

    <script>
        let currentFilter = 'all';
        let cart = [];
        let lastStorageState = localStorage.getItem('tia_products');

        window.onload = function() { 
            if(!localStorage.getItem('tia_products')) {
                let defaultProducts = [
                    { id: 1, name: "سترة شتوية حضرية (Urban Jacket)", category: "men", price: 1890, stock: 12, desc: "طبقات متينة ومقاومة للطقس البارد، توفر دفئاً مثالياً ومظهراً فخماً يتناسب مع بيئات العمل والمناسبات الرسمية.", img: "https://images.unsplash.com/photo-1618886614638-80e3c103d31a?q=80&w=500" },
                    { id: 2, name: "مصباح طاقة ذكي مصمم هندسياً", category: "home", price: 950, stock: 8, desc: "إضاءة محيطية تفاعلية بـ 16 مليون لون مع إمكانية التحكم والربط الذكي الكامل عبر شاشات الأجهزة الذكية.", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=500" },
                    { id: 3, name: "فستان خريف ستوديو عالي الجودة", category: "women", price: 3100, stock: 5, desc: "تصميم انسيابي كلاسيكي محاك من خامات فاخرة مستدامة ليعطيك حضوراً واثقاً وإطلالة رسمية راقية.", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=500" }
                ];
                localStorage.setItem('tia_products', JSON.stringify(defaultProducts));
            }
            renderProducts(); 
            
            setInterval(function() {
                let currentState = localStorage.getItem('tia_products');
                if (currentState !== lastStorageState) {
                    lastStorageState = currentState;
                    renderProducts();
                }
            }, 500);
        };

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            let filteredItems = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            if(filteredItems.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted); text-align:center; grid-column: 1/-1; padding: 40px; font-size:14px;">لا توجد منتجات متوفرة في هذا القسم حالياً.</p>`;
                return;
            }

            filteredItems.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-wrapper"><img class="product-img" src="${p.img}"></div>
                        <div class="product-info">
                            <span class="product-category">${translateCat(p.category)}</span>
                            <h3 class="product-name">${p.name}</h3>
                            <p class="product-desc">${p.desc}</p>
                            <span class="product-stock">المخزون: ${p.stock} قطع</span>
                            <div class="card-footer-row">
                                <span class="product-price">${p.price} ج.م</span>
                                <button class="btn-add-cart" onclick="addToCartById(${p.id})">إضافة</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // تحديث كلاس الأزرار النشطة للشاشات الكبيرة والموبايل
            document.querySelectorAll('.nav-filter-btn, .mobile-nav-btn').forEach(b => b.classList.remove('active'));
            
            const activeBtn = document.getElementById('btn-' + currentFilter);
            if(activeBtn) activeBtn.classList.add('active');

            const mActiveBtn = document.getElementById('mbtn-' + currentFilter);
            if(mActiveBtn) mActiveBtn.classList.add('active');
        }

        function translateCat(cat) {
            const mapping = { men: "ملابس رجالي", women: "ملابس حريمي", kids: "ملابس أطفال", accessories: "إكسسوارات", home: "أدوات منزلية" };
            return mapping[cat] || cat;
        }

        function filterProducts(category) {
            currentFilter = category;
            document.getElementById('sectionTitleDisplay').innerText = category === 'all' ? "كل المجموعات الحالية" : "قسم: " + translateCat(category);
            renderProducts();
        }

        function addToCartById(id) {
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            const prod = products.find(p => p.id === id);
            if (!prod || prod.stock <= 0) { alert('عذراً، المنتج غير متوفر في المخزن حالياً.'); return; }
            
            prod.stock--;
            localStorage.setItem('tia_products', JSON.stringify(products));
            lastStorageState = JSON.stringify(products);
            
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) { cartItem.qty++; } else { cart.push({ id: prod.id, name: prod.name, price: prod.price, img: prod.img, qty: 1 }); }
            updateCart();
            renderProducts();
        }

        function changeQty(id, delta) {
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            const item = cart.find(i => i.id === id);
            const prod = products.find(p => p.id === id);
            
            if (delta > 0) {
                if (!prod || prod.stock <= 0) { alert('الكمية المطلوبة غير متوفرة بالمخزن.'); return; }
                prod.stock--; item.qty++;
            } else {
                if(prod) prod.stock++;
                item.qty--;
                if (item.qty <= 0) { cart = cart.filter(i => i.id !== id); }
            }
            localStorage.setItem('tia_products', JSON.stringify(products));
            lastStorageState = JSON.stringify(products);
            updateCart();
            renderProducts();
        }

        function updateCart() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('mobileCartCount').innerText = count;
            
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                total += (item.price * item.qty);
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex-grow:1; text-align:right;">
                            <div style="font-size:14px; font-weight:500; margin-bottom:4px;">${item.name}</div>
                            <div style="color:var(--accent-gold); font-size:13px; font-weight:700;">${item.price} ج.م</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span style="font-weight:700; min-width:15px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cartTotalSum').innerText = total + ' ج.م';
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    </script>
</body>
</html>
