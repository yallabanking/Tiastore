<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم TIA STORE | مستقلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark-deep: #090D16;
            --bg-dark-card: #131A26;
            --accent-neon: #38BDF8;
            --accent-gold: #F59E0B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --danger-color: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-dark-deep); color: var(--text-main); padding: 30px 20px; }
        .admin-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .panel-card { background-color: var(--bg-dark-card); border-radius: 20px; padding: 25px; border: 1px solid rgba(148, 163, 184, 0.08); height: fit-content; }
        h2, h3 { margin-bottom: 20px; font-weight: 700; color: var(--text-main); border-bottom: 1px solid rgba(148, 163, 184, 0.08); padding-bottom: 10px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 12px; background-color: var(--bg-dark-deep); border: 1px solid rgba(148, 163, 184, 0.15); color: var(--text-main); border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
        input[type="file"] { background-color: rgba(56, 189, 248, 0.05); border: 1px dashed var(--accent-neon); color: var(--accent-neon); cursor: pointer; }
        button { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; background-color: var(--accent-neon); color: var(--bg-dark-deep); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        /* جدول إدارة وحذف المنتجات داخل لوحة التحكم */
        .products-table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(148, 163, 184, 0.08); }
        th { color: var(--accent-neon); font-size: 15px; }
        .table-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .btn-delete { background-color: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.2); padding: 6px 12px; border-radius: 8px; font-size: 13px; width: auto; }
        .btn-delete:hover { background-color: var(--danger-color); color: white; }
        
        @media (max-width: 768px) { .admin-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 32px; color: var(--text-main);">لوحة التحكم الاحترافية الفضائية لحساب <span>TIA STORE</span></h1>
        <p style="color: var(--text-muted); margin-top: 10px;">إدارة المخزون، رفع الصور الفورية من الجهاز، وحذف المنتجات من الموقع بالكامل</p>
    </div>

    <div class="admin-container">
        <!-- نموذج الإضافة -->
        <div class="panel-card">
            <h3>⚙️ إضافة منتج للمخزن</h3>
            <label>اسم المنتج:</label>
            <input type="text" id="pName" value="جاكيت كاجوال فاخر">
            
            <label>القسم المخصص:</label>
            <select id="pCategory">
                <option value="men">ملابس رجالي</option>
                <option value="women">ملابس حريمي</option>
                <option value="kids">ملابس أطفال</option>
                <option value="accessories">اكسسوارات</option>
                <option value="home">أدوات منزلية</option>
            </select>
            
            <label>السعر (ج.م):</label>
            <input type="number" id="pPrice" value="990">
            
            <label>رفع صورة من جهازك 📁:</label>
            <input type="file" id="pImgFile" accept="image/*">
            
            <label>المواصفات والوصف:</label>
            <textarea id="pDesc" rows="3">خامات عالمية ممتازة مريحة جداً ومناسبة لكافة الأوقات والأنشطة.</textarea>
            
            <label>كمية المخزون المتاحة:</label>
            <input type="number" id="pStock" value="10">
            
            <button onclick="addNewProduct()">🚀 نشر وإرسال للموقع</button>
        </div>

        <!-- جدول الحذف والمراقبة المباشرة -->
        <div class="panel-card">
            <h3>📦 كل المنتجات الحالية بالمتجر (امسح واحذف من هنا)</h3>
            <div class="products-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>القسم</th>
                            <th>السعر</th>
                            <th>المخزون</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductsTable">
                        <!-- تظهر المنتجات برمجياً هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات المبدئية في حال لم تكن مخزنة من قبل
        let defaultProducts = [
            { id: 1, name: "سترة شتوية حضرية (Urban Jacket)", category: "men", price: 1890, stock: 12, desc: "مصنوعة من طبقات مقاومة للرياح ومبطنة بالكامل لتوفير دفء ممتاز بنمط عالمي الفخامة.", img: "https://images.unsplash.com/photo-1618886614638-80e3c103d31a?q=80&w=500" },
            { id: 2, name: "مصباح طاقة ذكي هندسي وعصري", category: "home", price: 950, stock: 8, desc: "إضاءة محيطية متقدمة وتفاعلية بـ 16 مليون لون مع إمكانية التحكم الكامل بواسطة الهاتف.", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=500" },
            { id: 3, name: "فستان خريف ستوديو عالي الجودة", category: "women", price: 3100, stock: 5, desc: "منسوج من خامات فاخرة مستدامة توفر إطلالة استثنائية تجذب الأنظار في كافة الفعاليات.", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=500" }
        ];

        let products = JSON.parse(localStorage.getItem('tia_products')) || defaultProducts;

        function updateStorage() {
            localStorage.setItem('tia_products', JSON.stringify(products));
            renderAdminTable();
        }

        function translateCat(cat) {
            const mapping = { men: "ملابس رجالي", women: "ملابس حريمي", kids: "ملابس أطفال", accessories: "اكسسوارات", home: "أدوات منزلية" };
            return mapping[cat] || cat;
        }

        // دالة عرض المنتجات في جدول لوحة التحكم مع أزرار الحذف الفورية
        function renderAdminTable() {
            const tbody = document.getElementById('adminProductsTable');
            tbody.innerHTML = '';
            products.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><img class="table-img" src="${p.img}"></td>
                        <td style="font-weight:bold;">${p.name}</td>
                        <td>${translateCat(p.category)}</td>
                        <td style="color:var(--accent-gold); font-weight:700;">${p.price} ج.م</td>
                        <td>${p.stock} قطعة</td>
                        <td><button class="btn-delete" onclick="deleteProduct(${p.id})">🗑️ حذف نهائي</button></td>
                    </tr>
                `;
            });
        }

        function addNewProduct() {
            const name = document.getElementById('pName').value;
            const category = document.getElementById('pCategory').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const desc = document.getElementById('pDesc').value;
            const stock = parseInt(document.getElementById('pStock').value);
            const fileInput = document.getElementById('pImgFile');

            if(!name || !price) { alert('برجاء إدخال البيانات الأساسية للمنتج'); return; }

            let imgUrl = "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400";

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgUrl = e.target.result;
                    pushProduct(name, category, price, desc, stock, imgUrl);
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                pushProduct(name, category, price, desc, stock, imgUrl);
            }
        }

        function pushProduct(name, category, price, desc, stock, img) {
            products.push({ id: Date.now(), name, category, price, stock, desc, img });
            updateStorage();
            document.getElementById('pImgFile').value = '';
            alert('تم رفع الصورة وإرسال الكارت بنجاح لواجهة المتجر!');
        }

        // دالة الحذف المستقلة والآمنة من لوحة التحكم فقط
        function deleteProduct(id) {
            if(confirm('هل أنت متأكد من رغبتك في مسح هذا المنتج نهائياً من شاشة العملاء والموقع؟')) {
                products = products.filter(p => p.id !== id);
                updateStorage();
            }
        }

        // التشغيل الأول للوحة التحكم
        renderAdminTable();
    </script>
</body>
</html>
