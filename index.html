<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA STORE | المفهوم التكيفي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 هندسة الألوان التكيفية للوضعين الداكن والفاتح */
        :root {
            /* الوضع الداكن الافتراضي (Dark Mode) */
            --bg-pure-black: #05070C;
            --bg-dock-glass: rgba(15, 23, 42, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --bg-card: #0D121F;
            --accent-gold: #D97706;
            --accent-neon: #38BDF8;
            --text-pure: #F8FAFC;
            --text-muted: #64748B;
            --shadow-card: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            /* الوضع الفاتح الاحترافي (Light Mode) */
            --bg-pure-black: #F8FAFC;
            --bg-dock-glass: rgba(255, 255, 255, 0.8);
            --border-glass: rgba(15, 23, 42, 0.08);
            --bg-card: #FFFFFF;
            --accent-gold: #B45309;
            --accent-neon: #0284C7;
            --text-pure: #0F172A;
            --text-muted: #64748B;
            --shadow-card: rgba(15, 23, 42, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-pure-black);
            color: var(--text-pure);
            letter-spacing: -0.2px;
            padding-bottom: 100px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-pure-black); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-neon); }

        button {
            cursor: pointer;
            border: none;
            background: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* الشعار العلوي وزر المود الذكي */
        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            border-bottom: 1px solid var(--border-glass);
            background: var(--bg-card);
            transition: background-color 0.4s ease;
        }

        /* الحفاظ على توسيط اللوجو */
        .header-spacer { width: 40px; } 

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-pure);
            letter-spacing: 3px;
        }

        .logo-text span {
            font-weight: 300;
            color: var(--text-muted);
        }

        /* ☀️ / 🌙 تصميم زر تغيير الوضع المودرن */
        .theme-toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-pure);
        }

        .theme-toggle-btn:hover {
            border-color: var(--accent-neon);
            background: rgba(56, 189, 248, 0.05);
            transform: scale(1.05);
        }

        .theme-toggle-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* 🎪 السلايدر التكيفي الذكي */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 480px;
            margin: 30px auto 0 auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 40px var(--shadow-card);
            transition: box-shadow 0.4s ease, border 0.4s ease;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 60px;
            text-align: right;
        }

        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 30%, var(--bg-pure-black) 100%);
            z-index: 1;
            transition: background 0.4s ease;
        }

        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 550px;
        }

        .slide-tag {
            color: var(--accent-neon);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        .slide-title {
            font-size: 34px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 15px;
            color: var(--text-pure);
        }

        .slide-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 300;
        }

        .btn-slide-action {
            background-color: var(--text-pure);
            color: var(--bg-pure-black);
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            transition: background-color 0.4s, color 0.4s;
        }

        .btn-slide-action:hover {
            background-color: var(--accent-neon);
            color: #05070C;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .slider-arrow:hover { background: var(--accent-neon); }
        .slider-arrow:hover svg { stroke: #05070C; }
        .slider-arrow svg { width: 20px; height: 20px; stroke: #FFFFFF; fill: none; stroke-width: 2; }

        .arrow-next { left: 20px; }
        .arrow-prev { right: 20px; }

        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 3;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: var(--accent-neon);
            width: 24px;
            border-radius: 4px;
        }

        /* 👑 القائمة السفلية العائمة المثبتة */
        .bottom-dock-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 750px;
            height: 75px;
            background: var(--bg-dock-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            transition: background 0.4s, border 0.4s, box-shadow 0.4s;
        }

        .dock-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            gap: 6px;
            flex: 1;
            height: 100%;
            position: relative;
        }

        .dock-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.8;
            transition: all 0.3s ease;
        }

        .dock-btn:hover, .dock-btn.active { color: var(--text-pure); font-weight: 700; }
        .dock-btn:hover svg, .dock-btn.active svg { stroke: var(--accent-neon); transform: translateY(-2px); }

        .dock-btn.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 15px;
            height: 2px;
            background-color: var(--accent-neon);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-neon);
        }

        /* سلة المشتريات الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -440px;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background-color: var(--bg-card);
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-glass);
            box-shadow: 25px 0 60px rgba(0,0,0,0.5);
        }

        .cart-sidebar.active { left: 0; }
        .cart-item { display: flex; gap: 15px; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 16px; margin-bottom: 15px; align-items: center; border: 1px solid var(--border-glass); }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }

        .qty-btn {
            background-color: rgba(0,0,0,0.05);
            color: var(--text-pure);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-header { border-bottom: 1px solid var(--border-glass); padding-bottom: 15px; margin-top: 40px; text-align: right; }
        .section-header h2 { font-size: 24px; font-weight: 900; color: var(--text-pure); }

        /* شبكة المنتجات الاحترافية الفاخرة */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 35px; }
        .product-card { background: var(--bg-card); border-radius: 24px; overflow: hidden; border: 1px solid var(--border-glass); display: flex; flex-direction: column; box-shadow: 0 15px 35px var(--shadow-card); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover { transform: translateY(-8px); border-color: var(--accent-neon); box-shadow: 0 30px 60px var(--shadow-card); }
        .product-img-wrapper { width: 100%; height: 380px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover .product-img { transform: scale(1.04); }
        .product-info { padding: 25px; text-align: right; display: flex; flex-direction: column; flex-grow: 1; }
        .product-category { font-size: 11px; color: var(--accent-neon); margin-bottom: 8px; font-weight: 700; }
        .product-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .product-desc { font-size: 13.5px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; font-weight: 300; }
        .product-stock { font-size: 11px; color: #10B981; background-color: rgba(16, 185, 129, 0.08); padding: 4px 10px; border-radius: 6px; width: fit-content; margin-bottom: 20px; }
        .card-footer-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-glass); padding-top: 15px; }
        .product-price { color: var(--accent-gold); font-weight: 700; font-size: 20px; }
        .btn-add-cart { background-color: var(--text-pure); color: var(--bg-pure-black); padding: 10px 20px; font-size: 13px; font-weight: 700; border-radius: 8px; transition: background-color 0.4s, color 0.4s; }
        .btn-add-cart:hover { background-color: var(--accent-neon); color: #05070C; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .close-btn { color: var(--text-muted); font-size: 32px; }
        .dock-cart-badge { position: absolute; top: 10px; right: 22px; background-color: var(--accent-gold); color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; font-weight: 700; }

        @media (max-width: 768px) {
            .brand-header { padding: 20px; }
            .slider-container { height: 350px; margin: 15px; border-radius: 16px; }
            .slide { padding: 0 30px; }
            .slide-title { font-size: 24px; }
            .bottom-dock-nav { width: 95%; bottom: 15px; height: 70px; border-radius: 20px; }
            .dock-btn { font-size: 10px; gap: 4px; }
            .dock-btn svg { width: 20px; height: 20px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-img-wrapper { height: 220px; }
            .product-info { padding: 15px; }
            .product-name { font-size: 14px; }
            .product-desc { display: none; }
            .card-footer-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .btn-add-cart { width: 100%; text-align: center; }
            .cart-sidebar { max-width: 100%; }
            .dock-cart-badge { top: 8px; right: 15px; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="header-spacer"></div> <button class="logo-btn" onclick="filterProducts('all')"><h1 class="logo-text">TIA <span>STORE</span></h1></button>
        
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeToggleBtn" title="تبديل الوضع">
            <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.828 5.657a8 8 0 11-8.586-8.586 8.001 8.001 0 008.586 8.586z"/></svg>
        </button>
    </div>

    <div class="slider-container">
        <div class="slider-wrapper" id="sliderWrapper"></div>
        <button class="slider-arrow arrow-prev" onclick="moveSlide(-1)"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
        <button class="slider-arrow arrow-next" onclick="moveSlide(1)"><svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="bottom-dock-nav">
        <button class="dock-btn active" id="mbtn-all" onclick="filterProducts('all')">
            <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11v11a1 1 0 01-1 1h-3m-6 0V12a1 1 0 011-1h2a1 1 0 011 1v9"/></svg>
            الرئيسية
        </button>
        <button class="dock-btn" id="mbtn-women" onclick="filterProducts('women')">
            <svg viewBox="0 0 24 24"><path d="M12 4a4 4 0 100 8 4 4 0 000-8zM6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
            حريمي
        </button>
        <button class="dock-btn" id="mbtn-men" onclick="filterProducts('men')">
            <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            رجالي
        </button>
        <button class="dock-btn" id="mbtn-kids" onclick="filterProducts('kids')">
            <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zM5 20a7 7 0 0114 0H5z"/></svg>
            أطفال
        </button>
        <button class="dock-btn" onclick="toggleCart()">
            <svg viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span class="dock-cart-badge" id="cartCount">0</span>
            السلة
        </button>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-glass); padding-bottom: 15px;">
            <h3 style="font-size:20px; font-weight:700;">سلة المشتريات</h3>
            <button class="close-btn" onclick="toggleCart()">×</button>
        </div>
        <div style="flex-grow: 1; overflow-y: auto;" id="cartItemsContainer"></div>
        <div style="border-top: 1px solid var(--border-glass); padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 16px; font-weight: 700;">
                <span>الإجمالي:</span>
                <span id="cartTotalSum" style="color: var(--accent-gold);">0 ج.م</span>
            </div>
            <button style="width: 100%; padding: 15px; background-color: var(--text-pure); color: var(--bg-pure-black); border-radius:8px; font-weight:700; font-size:14px;" onclick="alert('جاري توجيهك الآمن لشبكة المدفوعات الإلكترونية...')">الانتقال للدفع الآمن</button>
        </div>
    </div>

    <div class="main-container">
        <div class="section-header">
            <h2 id="sectionTitleDisplay">كل المجموعات المتوفرة</h2>
        </div>
        <div class="products-grid" id="productsContainer"></div>
    </div>

    <script>
        let currentFilter = 'all';
        let cart = [];
        let lastStorageState = localStorage.getItem('tia_products');
        let slideIndex = 0;

        window.onload = function() { 
            if(!localStorage.getItem('tia_products')) {
                let defaultProducts = [
                    { id: 1, name: "سترة شتوية حضرية (Urban Jacket)", category: "men", price: 1890, stock: 12, desc: "طبقات متينة ومقاومة للطقس البارد، توفر دفئاً مثالياً ومظهراً فخماً يتناسب مع بيئات العمل والمناسبات الرسمية.", img: "https://images.unsplash.com/photo-1618886614638-80e3c103d31a?q=80&w=500" },
                    { id: 2, name: "مصباح طاقة ذكي مصمم هندسياً", category: "home", price: 950, stock: 8, desc: "إضاءة محيطية تفاعلية بـ 16 مليون لون مع إمكانية التحكم والربط الذكي الكامل عبر شاشات الأجهزة الذكية.", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=500" },
                    { id: 3, name: "فستان خريف ستوديو عالي الجودة", category: "women", price: 3100, stock: 5, desc: "تصميم انسيابي كلاسيكي محاك من خامات فاخرة مستدامة ليعطيك حضوراً واثقاً وإطلالة رسمية راقية.", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=500" }
                ];
                localStorage.setItem('tia_products', JSON.stringify(defaultProducts));
            }
            
            // قراءة المود المحفوظ سابقاً في متصفح العميل لراحتهم
            const savedTheme = localStorage.getItem('tia_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            renderStore(); 
            
            setInterval(function() {
                let currentState = localStorage.getItem('tia_products');
                if (currentState !== lastStorageState) {
                    lastStorageState = currentState;
                    renderStore();
                }
            }, 500);

            setInterval(() => { moveSlide(1); }, 5000);
        };

        // 🧠 دالة تبديل الوضع برمجياً وجملياً بين الداكن والفاتح
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('tia_theme', newTheme);
            updateThemeIcon(newTheme);
            buildAdaptiveSlider(); // إعادة بناء السلايدر ليتناسب التظليل مع المود الجديد فوراً
        }

        // دالة تبديل شكل الأيقونة برمجياً (رسم شمس واضحة للنهار وقمر لليل)
        function updateThemeIcon(theme) {
            const iconSvg = document.getElementById('themeIcon');
            if(theme === 'light') {
                // أيقونة شمس هندسية واضحة في وضع النهار
                iconSvg.innerHTML = `<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`;
            } else {
                // أيقونة قمر نيون كلاسيكية في الوضع الليلي الفاخر
                iconSvg.innerHTML = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
            }
        }

        function renderStore() {
            renderProducts();
            buildAdaptiveSlider();
        }

        function buildAdaptiveSlider() {
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            const sliderWrapper = document.getElementById('sliderWrapper');
            const dotsContainer = document.getElementById('sliderDots');
            
            if(!sliderWrapper) return;
            sliderWrapper.innerHTML = '';
            dotsContainer.innerHTML = '';

            let targetProducts = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            let latestItems = [...targetProducts].reverse().slice(0, 3);

            if(latestItems.length === 0) {
                sliderWrapper.innerHTML = `
                    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200');">
                        <div class="slide-content">
                            <span class="slide-tag">${translateCat(currentFilter)} ✨</span>
                            <h2 class="slide-title">ترقبوا تشكيلة قريبة</h2>
                            <p class="slide-desc">مجموعاتنا المخصصة لهذا القسم جاري تحضيرها برعاية كبار المصممين.</p>
                        </div>
                    </div>`;
                return;
            }

            latestItems.forEach((p, idx) => {
                sliderWrapper.innerHTML += `
                    <div class="slide" style="background-image: url('${p.img}');">
                        <div class="slide-content">
                            <span class="slide-tag">${currentFilter === 'all' ? 'وصل حديثاً للمتجر كلياً' : 'أحدث تشكيلة في قسم: ' + translateCat(p.category)} ✨</span>
                            <h2 class="slide-title">${p.name}</h2>
                            <p class="slide-desc">${p.desc.substring(0, 110)}...</p>
                            <div style="display:flex; gap:15px; align-items:center; margin-top:20px;">
                                <span style="color:var(--accent-gold); font-weight:700; font-size:22px;">${p.price} ج.م</span>
                                <button class="btn-slide-action" onclick="addToCartById(${p.id})">إضافة فورية للسلة</button>
                            </div>
                        </div>
                    </div>`;
                
                dotsContainer.innerHTML += `<span class="dot ${idx === slideIndex ? 'active' : ''}" onclick="currentSlide(${idx})"></span>`;
            });
            
            if (slideIndex >= latestItems.length) slideIndex = 0;
            showSlides();
        }

        function showSlides() {
            const wrapper = document.getElementById('sliderWrapper');
            const dots = document.getElementsByClassName('dot');
            if (dots.length === 0) return;
            
            if (slideIndex >= dots.length) slideIndex = 0;
            if (slideIndex < 0) slideIndex = dots.length - 1;
            
            wrapper.style.transform = `translateX(${slideIndex * 100}%)`;
            
            for (let i = 0; i < dots.length; i++) { dots[i].classList.remove('active'); }
            if(dots[slideIndex]) dots[slideIndex].classList.add('active');
        }

        function moveSlide(n) { slideIndex += n; showSlides(); }
        function currentSlide(n) { slideIndex = n; showSlides(); }

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            let filteredItems = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            if(filteredItems.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted); text-align:center; grid-column: 1/-1; padding: 40px; font-size:14px;">لا توجد منتجات متوفرة حالياً في هذا القسم.</p>`;
                return;
            }

            filteredItems.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-wrapper"><img class="product-img" src="${p.img}"></div>
                        <div class="product-info">
                            <span class="product-category">${translateCat(p.category)}</span>
                            <h3 class="product-name">${p.name}</h3>
                            <p class="product-desc">${p.desc}</p>
                            <span class="product-stock">المخزون المتوفر: ${p.stock} قطع</span>
                            <div class="card-footer-row">
                                <span class="product-price">${p.price} ج.م</span>
                                <button class="btn-add-cart" onclick="addToCartById(${p.id})">إضافة للسلة</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('mbtn-' + currentFilter);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function translateCat(cat) {
            const mapping = { men: "ملابس رجالي", women: "ملابس حريمي", kids: "ملابس أطفال", accessories: "إكسسوارات", home: "أدوات منزلية" };
            return mapping[cat] || cat;
        }

        function filterProducts(category) {
            currentFilter = category;
            slideIndex = 0; 
            document.getElementById('sectionTitleDisplay').innerText = category === 'all' ? "كل المجموعات المتوفرة" : "قسم: " + translateCat(category);
            renderStore();
        }

        function addToCartById(id) {
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            const prod = products.find(p => p.id === id);
            if (!prod || prod.stock <= 0) { alert('عذراً، المنتج غير متوفر في المخزن حالياً.'); return; }
            
            prod.stock--;
            localStorage.setItem('tia_products', JSON.stringify(products));
            lastStorageState = JSON.stringify(products);
            
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) { cartItem.qty++; } else { cart.push({ id: prod.id, name: prod.name, price: prod.price, img: prod.img, qty: 1 }); }
            updateCart();
            renderStore();
        }

        function changeQty(id, delta) {
            let products = JSON.parse(localStorage.getItem('tia_products')) || [];
            const item = cart.find(i => i.id === id);
            const prod = products.find(p => p.id === id);
            
            if (delta > 0) {
                if (!prod || prod.stock <= 0) { alert('الكمية المطلوبة غير متوفرة بالمخزن.'); return; }
                prod.stock--; item.qty++;
            } else {
                if(prod) prod.stock++;
                item.qty--;
                if (item.qty <= 0) { cart = cart.filter(i => i.id !== id); }
            }
            localStorage.setItem('tia_products', JSON.stringify(products));
            lastStorageState = JSON.stringify(products);
            updateCart();
            renderStore();
        }

        function updateCart() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cartCount').innerText = count;
            
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                total += (item.price * item.qty);
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex-grow:1; text-align:right;">
                            <div style="font-size:14px; font-weight:500; margin-bottom:4px;">${item.name}</div>
                            <div style="color:var(--accent-gold); font-size:13px; font-weight:700;">${item.price} ج.م</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span style="font-weight:700; min-width:15px; text-align:center; font-size:13px;">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cartTotalSum').innerText = total + ' ج.م';
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    </script>
</body>
</html>
